
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lablink-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lablink-frontend
  template:
    metadata:
      labels:
        app: lablink-frontend
    spec:
      containers:
      - name: frontend
        image: lablink-frontend:latest # Replace with registry image
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: lablink-frontend
spec:
  selector:
    app: lablink-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
