name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'deployment/**'
      - '.github/workflows/deploy.yml'
      - 'Dockerfile'
      - 'manage.py'
      - 'poetry.lock'
  workflow_dispatch:

