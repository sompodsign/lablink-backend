  #       run: poetry run python manage.py test core apps.appointments apps.payments --keepdb -v 2

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "./"
          target: "${{ secrets.PROD_DEPLOY_PATH }}/lablink-backend"
          rm: false
          overwrite: true

      - name: Build and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            # Create production .env
            cat > lablink-backend/deployment/.env << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.DOMAIN }},*.${{ secrets.DOMAIN }},localhost
            POSTGRES_DB=lablink
            POSTGRES_USER=lablink_user
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            CELERY_BROKER_URL=redis://redis:6379/0
            CELERY_RESULT_BACKEND=redis://redis:6379/0
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
            ENVEOF

            # Build backend image
            echo "🔨 Building backend image..."
            docker build -t lablink-backend:latest ./lablink-backend/

            # Start services
            echo "🚀 Starting services..."
            cd lablink-backend/deployment
            docker compose -f docker-compose.prod.yml up -d --force-recreate backend celery_worker celery_beat

            # Health check
            echo "⏳ Waiting for startup..."
            sleep 10
            HTTP_CODE=$(curl -sf http://localhost:4010/api/auth/profile/ -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend is healthy! (HTTP $HTTP_CODE)"
            else
              echo "⚠️ Health check returned HTTP $HTTP_CODE"
            fi
