name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'deployment/**'
      - '.github/workflows/deploy.yml'
      - 'Dockerfile'
      - 'manage.py'
      - 'pyproject.toml'
      - 'poetry.lock'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'manage.py'
      - 'pyproject.toml'
      - 'poetry.lock'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  POETRY_VERSION: '2.1'
  PYTHONPATH: src

# ──────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint ─────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

  # ── 2. Test & Coverage ──────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lablink
          POSTGRES_USER: lablink_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U lablink_user -d lablink"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: core.config.local
      POSTGRES_DB: lablink
      POSTGRES_USER: lablink_user
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      SECRET_KEY: ci-test-secret-key-not-for-production
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --no-root

      - name: Check migrations
        run: poetry run python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: poetry run python manage.py migrate --noinput

      - name: Collect static (dry run)
        run: poetry run python manage.py collectstatic --noinput --dry-run 2>/dev/null || poetry run python manage.py collectstatic --noinput

      - name: Run tests with coverage
        run: |
          poetry run coverage run manage.py test \
            core.tenants.tests \
            core.users.tests \
            apps.appointments.tests \
            apps.diagnostics.tests \
            apps.diagnostics.management.commands.tests \
            apps.notifications.tests \
            apps.payments.tests \
            -v 2

      - name: Coverage report
        run: |
          poetry run coverage report --fail-under=50
          poetry run coverage xml -o coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── 3. Deploy (main branch only) ────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          if printf '%s' "$SSH_KEY" | grep -q '\\n'; then
            printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > "$HOME/.ssh/deploy_key"
          else
            printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/deploy_key"
          fi
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p 22 ${{ secrets.DEPLOY_HOST }} >> "$HOME/.ssh/known_hosts"
          ssh -i "$HOME/.ssh/deploy_key" -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p '${{ secrets.PROD_DEPLOY_PATH }}/lablink-backend'"

      - name: Sync to server
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no"
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            --exclude '.ruff_cache' \
            --exclude '.mypy_cache' \
            --exclude '.pytest_cache' \
            --exclude 'deployment/.env' \
            -e "$RSYNC_SSH" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/lablink-backend/

      - name: Build and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            # Create production .env
            cat > lablink-backend/deployment/.env << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            POSTGRES_DB=lablink
            POSTGRES_USER=lablink_user
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            CELERY_BROKER_URL=redis://redis:6379/0
            CELERY_RESULT_BACKEND=redis://redis:6379/0
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
            ENVEOF

            # Build backend image
            echo "🔨 Building backend image..."
            docker build --no-cache -t lablink-backend:latest ./lablink-backend/

            # Start services
            echo "🚀 Starting services..."
            cd lablink-backend/deployment
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Health check
            echo "⏳ Waiting for startup..."
            sleep 10
            HTTP_CODE=$(curl -sf http://localhost:4010/api/auth/profile/ -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend is healthy! (HTTP $HTTP_CODE)"
            else
              echo "⚠️ Health check returned HTTP $HTTP_CODE"
              exit 1
            fi
