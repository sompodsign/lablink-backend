services:
  backend:
    image: lablink-backend:latest
    container_name: lablink_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.config.prod
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - backend_media:/app/media
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/auth/profile/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - lablink_network

  celery_worker:
    image: lablink-backend:latest
    container_name: lablink_celery_worker
    restart: unless-stopped
    command: celery -A core worker --loglevel=info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.config.prod
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - lablink_network

  celery_beat:
    image: lablink-backend:latest
    container_name: lablink_celery_beat
    restart: unless-stopped
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.config.prod
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lablink_network

  db:
    image: postgres:16-alpine
    container_name: lablink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lablink
      POSTGRES_USER: lablink_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "55436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lablink_user -d lablink"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lablink_network

  redis:
    image: redis:7-alpine
    container_name: lablink_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lablink_network

volumes:
  postgres_data:
  redis_data:
  backend_media:

networks:
  lablink_network:
    driver: bridge
