# ── Frontend SPA (lablink.bd + *.lablink.bd tenant subdomains) ──
server {
    listen 443 ssl;
    server_name lablink.bd *.lablink.bd;

    ssl_certificate /etc/letsencrypt/live/lablink.bd-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lablink.bd-wildcard/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin            $http_origin;
        proxy_read_timeout 60s;
    }

    location / {
        root /home/shampad/projects/lablink/lablink-backend/deployment/frontend_dist;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── Backend API (api.lablink.bd) ────────────────────────────────
server {
    listen 443 ssl;
    server_name api.lablink.bd;

    ssl_certificate /etc/letsencrypt/live/lablink.bd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lablink.bd/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Static files → served directly from GCS (https://storage.googleapis.com/lablink-static/static/)
    # No /static/ proxy needed here.

    location /media/ {
        alias /var/lib/docker/volumes/deployment_backend_media/_data/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin            $http_origin;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ── HTTP → HTTPS redirects ──────────────────────────────────────
server {
    listen 80;
    server_name lablink.bd *.lablink.bd api.lablink.bd;
    return 301 https://$host$request_uri;
}
